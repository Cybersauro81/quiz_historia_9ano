<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Verdadeiro ou Falso</title>
    <link rel="stylesheet" href="css/styles.css"> <!-- Link para CSS separado -->
</head>
<body>
    <h1>Quiz: Verdadeiro ou Falso</h1>
    <div id="quiz"></div>
    <button class="submit" onclick="submitQuiz()">Finalizar Quiz</button>
    <button class="submit" onclick="initQuiz()">Reiniciar Quiz</button>
    <div id="result" class="result">
        <h2>Resultado</h2>
        <p id="score"></p>
    </div>
    <div id="review" class="review">
        <h2>Revisão das Respostas</h2>
        <div id="review-list"></div>
    </div>
    <script src="js/script.js"></script> <!-- Link para JS separado -->
</body>
</html>
